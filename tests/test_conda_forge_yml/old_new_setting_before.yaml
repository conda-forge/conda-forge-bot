azure:
  store_build_artifacts: true
  free_disk_space: true
  settings_linux:
    swapfile_size: 0GiB
    variables:
      CONDA_FORGE_DOCKER_RUN_ARGS: --ignored
  settings_win:
    variables:
      MINIFORGE_HOME: D:\miniforge3
      CONDA_BLD_PATH: C:\bld
      SET_PAGEFILE: False
docker:
  run_args: --cap-add SYS_ADMIN
github_actions:
  store_build_artifacts: true
  free_disk_space: [apt, cache]
  resize_win_partitions: false
workflow_settings:
  store_build_artifacts: false
  free_disk_space: skip
  pagefile_size: 1
  resize_partitions:
    - os: win
      provider: github_actions
      value: true
  build_workspace_dir:
    - provider: azure
      os: win
      value: C:\bld
  tools_install_dir:
    - provider: azure
      os: win
      value: D:\miniforge3
