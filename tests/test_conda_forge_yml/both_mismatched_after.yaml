workflow_settings:
  store_build_artifacts:
    - provider: azure
      value: true
    - provider: github_actions
      value: false
  free_disk_space:
    - provider: azure
      value: skip
    - provider: github_actions
      value: max
  pagefile_size:
    - os: win
      value: 16
  resize_partitions:
    - provider: github_actions
      os: win
      value: true
